async function remote(){if(!backend.supabaseUrl||!backend.supabaseAnonKey)return;try{const {createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');client=createClient(backend.supabaseUrl,backend.supabaseAnonKey);const {data,error}=await client.from(backend.configTable).select('payload').eq('id',backend.configRowId).maybeSingle();if(error)throw error;if(data?.payload){config=merge(data.payload);render()}client.channel('member-page-config').on('postgres_changes',{event:'*',schema:'public',table:backend.configTable,filter:`id=eq.${backend.configRowId}`},p=>{if(p.new?.payload){config=merge(p.new.payload);render()}}).subscribe()}catch(e){console.warn('远程配置读取失败',e)}}
config=local();render();window.addEventListener('storage',e=>{if(e.key===KEY&&e.newValue){config=merge(JSON.parse(e.newValue));render()}});if('BroadcastChannel'in window){channel=new BroadcastChannel(CHANNEL);channel.onmessage=e=>{if(e.data?.type==='local-draft'&&e.data.payload){config=merge(e.data.payload);render()}}}$('#closePage').onclick=()=>{if(window.opener)window.close();else if(history.length>1)history.back();else location.replace('about:blank')};remote();
</script>
</body></html>
